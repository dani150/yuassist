<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YU Assist</title>
<link rel="icon" type="image/jpeg" href="/bot-logo.jpeg" />
<link rel="apple-touch-icon" href="/bot-logo.jpeg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #152030;
  --orb1: rgba(56,139,253,0.24);
  --orb2: rgba(56,139,253,0.14);
  --accent: #3B9EFF;
  --accent-dim: rgba(59,158,255,0.15);
  --accent-glow: rgba(59,158,255,0.35);
  --accent-solid: #1A6FCC;
  --user-bubble-bg: rgba(59,158,255,0.14);
  --user-bubble-border: rgba(59,158,255,0.32);
  --user-bubble-text: #C8E4FF;
  --bot-bubble-bg: rgba(255,255,255,0.08);
  --bot-bubble-border: rgba(255,255,255,0.14);
  --bot-bubble-text: #D8E8F5;
  --header-bg: rgba(18,35,56,0.80);
  --input-bg: rgba(255,255,255,0.06);
  --input-border: rgba(59,158,255,0.25);
  --input-focus: rgba(59,158,255,0.55);
  --send-bg: #3B9EFF;
  --send-hover: #5BAFFF;
  --label-active: #C8E4FF;
  --label-inactive: rgba(255,255,255,0.25);
  --chip-bg: rgba(59,158,255,0.1);
  --chip-border: rgba(59,158,255,0.25);
  --chip-text: #7EC8FF;
  --chip-hover-bg: rgba(59,158,255,0.22);
  --dot-color: #3B9EFF;
  --time-color: rgba(255,255,255,0.28);
  --toggle-track: rgba(59,158,255,0.3);
  --toggle-thumb: #3B9EFF;
  --transition: 0.5s cubic-bezier(.4,0,.2,1);
}

body.beren {
  --bg: #221228;
  --orb1: rgba(210,80,140,0.24);
  --orb2: rgba(210,80,140,0.14);
  --accent: #E070A8;
  --accent-dim: rgba(210,80,140,0.15);
  --accent-glow: rgba(210,80,140,0.35);
  --accent-solid: #A03468;
  --user-bubble-bg: rgba(210,80,140,0.14);
  --user-bubble-border: rgba(210,80,140,0.35);
  --user-bubble-text: #FFC8E0;
  --bot-bubble-text: #F5D8E8;
  --header-bg: rgba(30,16,36,0.80);
  --input-border: rgba(210,80,140,0.3);
  --input-focus: rgba(210,80,140,0.6);
  --send-bg: #D4537E;
  --send-hover: #E070A8;
  --label-active: #FFC8E0;
  --chip-bg: rgba(210,80,140,0.1);
  --chip-border: rgba(210,80,140,0.28);
  --chip-text: #F0A0C8;
  --chip-hover-bg: rgba(210,80,140,0.22);
  --dot-color: #E070A8;
  --toggle-track: rgba(210,80,140,0.35);
  --toggle-thumb: #D4537E;
}

html { height: 100%; }

body {
  font-family: 'Figtree', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: background var(--transition);
  overflow-x: hidden;
}

/* ── AMBIENT ORBS ── */
.bg-orbs {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0; overflow: hidden;
}

.orb {
  position: absolute; border-radius: 50%;
  filter: blur(90px);
  animation: drift 16s ease-in-out infinite alternate;
}

.orb-1 {
  width: 560px; height: 560px;
  background: var(--orb1);
  top: -140px; left: -120px;
  transition: background var(--transition);
}

.orb-2 {
  width: 420px; height: 420px;
  background: var(--orb2);
  bottom: 60px; right: -100px;
  animation-duration: 22s; animation-delay: -8s;
  transition: background var(--transition);
}

.orb-3 {
  width: 280px; height: 280px;
  background: var(--orb1);
  top: 55%; left: 50%;
  transform: translate(-50%,-50%);
  opacity: 0.35;
  animation-duration: 13s; animation-delay: -4s;
  transition: background var(--transition);
}

@keyframes drift {
  0%   { translate: 0 0; }
  50%  { translate: 28px 18px; }
  100% { translate: -18px 38px; }
}

/* ── HEADER ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--header-bg);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 66px;
  transition: background var(--transition);
}


.logo { display: flex; align-items: center; }

.logo-circle {
  width: 54px; height: 54px;
  border-radius: 50%;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  box-shadow: 0 0 18px var(--accent-glow), 0 2px 12px rgba(0,0,0,0.3);
  flex-shrink: 0;
  transition: box-shadow var(--transition);
}

.logo-img {
  width: 92px;
  height: auto;
  object-fit: contain;
  margin-top: 4px;
}

/* ── CAMPUS TOGGLE ── */
.campus-toggle {
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 30px; padding: 5px 14px;
  user-select: none;
}

.campus-label {
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  transition: color 0.3s; cursor: pointer;
}

.campus-label.wilf  { color: var(--label-active); }
.campus-label.beren { color: var(--label-inactive); }
body.beren .campus-label.wilf  { color: var(--label-inactive); }
body.beren .campus-label.beren { color: var(--label-active); }

.toggle-switch {
  position: relative; width: 40px; height: 22px; cursor: pointer; flex-shrink: 0;
}

.toggle-switch input { display: none; }

.toggle-track {
  position: absolute; inset: 0; border-radius: 11px;
  background: var(--toggle-track);
  border: 1px solid rgba(255,255,255,0.1);
  transition: background var(--transition);
}

.toggle-thumb {
  position: absolute; top: 3px; left: 3px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--toggle-thumb);
  box-shadow: 0 0 8px var(--accent-glow);
  transition: transform 0.3s cubic-bezier(.4,0,.2,1), background var(--transition), box-shadow var(--transition);
}

input:checked ~ .toggle-thumb { transform: translateX(18px); }

/* ── CHAT AREA ── */
.chat-wrapper {
  position: relative; z-index: 1;
  width: 100%; max-width: 740px; flex: 1;
  display: flex; flex-direction: column;
  padding: 86px 16px 148px;
}

/* ── WELCOME ── */
.welcome {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 56px 24px 40px;
  text-align: center; gap: 14px;
  animation: fadeUp 0.6s ease both;
}

.welcome-icon {
  width: 100px; height: 100px; border-radius: 50%;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 6px;
  box-shadow: 0 0 36px var(--accent-glow);
  transition: box-shadow var(--transition);
  overflow: hidden;
}

.welcome-logo {
  width: 130px;
  height: auto;
  object-fit: contain;
  margin-top: 6px;
}

.welcome h1 {
  font-family: 'Syne', sans-serif;
  font-size: 32px; font-weight: 700; color: #fff;
  letter-spacing: -0.5px; line-height: 1.1;
}

.welcome h1 em {
  font-style: normal; color: var(--accent); transition: color var(--transition);
}

.welcome p {
  font-size: 15px; color: rgba(255,255,255,0.42);
  max-width: 340px; line-height: 1.65; font-weight: 400;
}

.suggestion-chips {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center; margin-top: 6px;
}

.chip {
  padding: 8px 16px; border-radius: 20px;
  background: var(--chip-bg); color: var(--chip-text);
  font-family: 'Figtree', sans-serif;
  font-size: 13px; font-weight: 500;
  border: 1px solid var(--chip-border); cursor: pointer;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s, color var(--transition), border-color var(--transition);
}

.chip:hover {
  background: var(--chip-hover-bg);
  transform: translateY(-2px);
  box-shadow: 0 4px 16px var(--accent-glow);
}

/* ── MESSAGES ── */
.messages { display: flex; flex-direction: column; gap: 18px; padding: 8px 0; }

.message-row {
  display: flex; align-items: flex-end; gap: 10px;
  animation: fadeUp 0.35s cubic-bezier(.2,.8,.4,1) both;
}

.message-row.user { flex-direction: row-reverse; }

.avatar {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}

.avatar.bot {
  background: #fff;
  border: none;
  box-shadow: 0 0 12px var(--accent-glow);
  transition: box-shadow var(--transition);
  overflow: hidden;
}

.avatar.bot .bot-logo {
  width: 38px;
  height: auto;
  object-fit: contain;
  margin-top: 5px;
}

.avatar.user {
  background: linear-gradient(135deg, var(--accent), var(--accent-solid));
  box-shadow: 0 0 12px var(--accent-glow);
  font-size: 10px; font-weight: 700; color: #fff; letter-spacing: 0.04em;
  transition: background var(--transition), box-shadow var(--transition);
}

.bubble {
  max-width: 76%; padding: 12px 17px; border-radius: 20px;
  font-size: 14.5px; line-height: 1.65; font-weight: 400;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}

.bubble.bot {
  background: var(--bot-bubble-bg);
  border: 1px solid var(--bot-bubble-border);
  border-bottom-left-radius: 5px;
  color: var(--bot-bubble-text);
}

.bubble.user {
  background: var(--user-bubble-bg);
  border: 1px solid var(--user-bubble-border);
  border-bottom-right-radius: 5px;
  color: var(--user-bubble-text);
  box-shadow: 0 2px 20px var(--accent-glow);
  transition: background var(--transition), border-color var(--transition), color var(--transition), box-shadow var(--transition);
}

.bubble time {
  display: block; font-size: 10.5px;
  color: var(--time-color); margin-top: 5px; font-weight: 400; letter-spacing: 0.02em;
}

/* typing */
.typing .bubble { padding: 14px 18px; }
.dots { display: flex; gap: 5px; align-items: center; }
.dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--dot-color);
  box-shadow: 0 0 6px var(--accent-glow);
  animation: bounce 1.1s infinite;
  transition: background var(--transition);
}
.dots span:nth-child(2) { animation-delay: 0.18s; }
.dots span:nth-child(3) { animation-delay: 0.36s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.7; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* ── INPUT BAR ── */
.input-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
  display: flex; justify-content: center;
  padding: 16px 16px 24px;
  background: linear-gradient(to top, var(--bg) 55%, transparent);
  transition: background var(--transition);
}

.input-inner {
  width: 100%; max-width: 740px;
  display: flex; align-items: flex-end; gap: 10px;
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: 24px; padding: 11px 11px 11px 20px;
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  transition: border-color 0.25s, box-shadow 0.25s;
}

.input-inner:focus-within {
  border-color: var(--input-focus);
  box-shadow: 0 0 0 3px var(--accent-dim), 0 4px 32px rgba(0,0,0,0.35);
}

#chat-input {
  flex: 1; border: none; outline: none;
  font-family: 'Figtree', sans-serif;
  font-size: 14.5px; line-height: 1.5;
  color: #e8f0fa; background: transparent;
  resize: none; max-height: 160px; min-height: 26px; padding: 0;
}

#chat-input::placeholder { color: rgba(255,255,255,0.3); }

.send-btn {
  width: 38px; height: 38px; border-radius: 13px; border: none;
  background: var(--send-bg); color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  box-shadow: 0 0 16px var(--accent-glow);
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
}

.send-btn:hover { background: var(--send-hover); transform: scale(1.07); box-shadow: 0 0 24px var(--accent-glow); }
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { background: rgba(255,255,255,0.1); box-shadow: none; cursor: not-allowed; transform: none; }
.send-btn svg { width: 16px; height: 16px; }

/* scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.date-divider {
  text-align: center; font-size: 11px;
  color: rgba(255,255,255,0.2); font-weight: 400;
  letter-spacing: 0.06em; text-transform: uppercase; margin: 4px 0;
}

@media (max-width: 600px) {
  .logo-text { font-size: 17px; }
  .campus-label { font-size: 11px; }
  .campus-toggle { padding: 4px 10px; gap: 8px; }
  .bubble { max-width: 86%; font-size: 14px; }
  .welcome h1 { font-size: 24px; }
  .header { padding: 0 16px; }
}
</style>
</head>

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
    sendBtn.disabled = !el.value.trim();
  }

  chatInput.addEventListener('input', () => { sendBtn.disabled = !chatInput.value.trim(); });

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled && !isBotTyping) sendMessage();
    }
  }

  function sendChip(btn) {
    const text = btn.textContent.replace(/^[\p{Emoji}\s]+/u, '').trim();
    chatInput.value = text;
    sendMessage();
  }

  async function sendMessage() {
    const text = chatInput.value.trim();
    if (!text || isBotTyping) return;
    welcomeScreen.style.display = 'none';
    appendMessage('user', text);
    chatInput.value = '';
    chatInput.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    try {
      const resp = await fetch('/api/chat-proxy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chatInput: text })
      });

      if (!resp.ok) throw new Error(`Server responded ${resp.status}`);

      const data = await resp.json();
      let reply = 'Sorry, I could not generate a response.';

      if (typeof data === 'string') {
        reply = data;
      } else if (Array.isArray(data) && data.length > 0) {
        const first = data[0];
        reply = first.output || first.reply || first.response || first.text || JSON.stringify(first);
      } else if (data && typeof data === 'object') {
        reply = data.output || data.reply || data.response || data.text || JSON.stringify(data);
      }

      hideTyping();
      appendMessage('bot', reply);
    } catch (err) {
      hideTyping();
      appendMessage('bot', 'Oops — something went wrong. Please try again in a moment.');
      console.error('Chat proxy error:', err);
    }
  }
